version: "3.9"

services:
  # ── Vector Database ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: aegis-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: aegis-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SIMILARITY_THRESHOLD=0.82
      - INJECTION_THRESHOLD=0.75
      - UPSTREAM_LLM_URL=${UPSTREAM_LLM_URL:-https://api.openai.com}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-sk-placeholder}
      - LOG_LEVEL=info
      - SEED_ON_STARTUP=true
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=        # Change this to empty
      - VITE_WS_URL=/ws
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ── Data Ingestion Job (One-off Task) ──────────────────────────────────────
  ingestion:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: aegis-ingestion
    profiles: ["setup"]
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - model_cache:/root/.cache/huggingface
    command: ["python", "-m", "app.ingest_hf_data"]

volumes:
  qdrant_data:
  redis_data:
  model_cache:
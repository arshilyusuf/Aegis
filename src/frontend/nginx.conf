server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. Route specific backend endpoints to the backend container
    # Since your frontend now calls /stats directly, route it here:
    location ~ ^/(stats|logs|health|v1|ws) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Keep WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # 2. React SPA fallback (everything else goes to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}